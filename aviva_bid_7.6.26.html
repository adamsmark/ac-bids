<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scope Proposal — Aviva Fort Worth | Adamsmark Construction</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     ADAMSMARK BID TOOL — AVIVA FORT WORTH (Bundle Select)
     Phase 1 Prototype
     ============================================================
     DATA BLOCK: edit the <script> block near the top of <body>.
     All prices are CLIENT-FACING. No internal costs shown.
  ============================================================ */
  :root {
    --red:#CC0000; --red-dark:#A30000; --black:#1A1A1A; --charcoal:#2E2E2E;
    --mid:#6B6B6B; --divider:#E2DFD9; --bg:#F8F7F5; --white:#FFFFFF;
    --gold:#9A7B2F; --selected-bg:#FFFBF0; --shadow-sm:0 1px 3px rgba(0,0,0,.08);
    --shadow-md:0 4px 16px rgba(0,0,0,.10); --radius:6px; --checked-bdr:#3B5BDB;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--black);font-size:15px;line-height:1.6;min-height:100vh;}
  .site-header{background:var(--black);padding:18px 48px;display:flex;align-items:center;justify-content:space-between;}
  .logo-lockup{display:flex;align-items:center;gap:14px;}
  .logo-svg{height:36px;width:auto;}
  .header-label{color:rgba(255,255,255,.45);font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;border-left:1px solid rgba(255,255,255,.18);padding-left:14px;line-height:1.3;}
  .header-badge{color:rgba(255,255,255,.5);font-size:11px;letter-spacing:.05em;}
  .property-hero{background:var(--red);padding:36px 48px 32px;position:relative;overflow:hidden;}
  .property-hero::after{content:'';position:absolute;right:-60px;top:-60px;width:280px;height:280px;border:1px solid rgba(255,255,255,.08);border-radius:50%;pointer-events:none;}
  .property-eyebrow{font-size:10.5px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:8px;}
  .property-name{font-family:'Playfair Display',Georgia,serif;font-size:32px;color:#fff;line-height:1.15;margin-bottom:6px;}
  .property-meta{color:rgba(255,255,255,.7);font-size:13px;display:flex;gap:20px;flex-wrap:wrap;}
  .property-meta span::before{content:'\00B7';margin-right:8px;opacity:.5;}
  .property-meta span:first-child::before{content:none;}
  .bid-layout{display:grid;grid-template-columns:1fr 320px;gap:32px;max-width:1100px;margin:0 auto;padding:40px 48px 80px;align-items:start;}
  .scope-section{min-width:0;}
  .section-heading{font-size:10.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--mid);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--divider);}
  .bundle-group{display:flex;flex-direction:column;gap:12px;margin-bottom:40px;}
  .bundle-card{background:var(--white);border:1.5px solid var(--divider);border-radius:var(--radius);cursor:pointer;transition:border-color .15s,box-shadow .15s,background .15s;position:relative;overflow:hidden;}
  .bundle-card:hover{border-color:#c8b57a;box-shadow:var(--shadow-md);}
  .bundle-card.selected{border-color:var(--gold);background:var(--selected-bg);box-shadow:0 0 0 3px rgba(154,123,47,.12),var(--shadow-md);}
  .bundle-card.selected::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);}
  .bundle-inner{padding:20px 24px;display:flex;align-items:flex-start;gap:16px;}
  .bundle-check{width:20px;height:20px;min-width:20px;border-radius:50%;border:2px solid var(--divider);background:var(--white);margin-top:2px;position:relative;transition:border-color .15s,background .15s;flex-shrink:0;}
  .bundle-card.selected .bundle-check{border-color:var(--gold);background:var(--gold);}
  .bundle-card.selected .bundle-check::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:#fff;}
  .bundle-content{flex:1;min-width:0;}
  .bundle-title{font-size:15px;font-weight:600;color:var(--black);margin-bottom:4px;}
  .bundle-desc{font-size:13px;color:var(--mid);line-height:1.5;}
  .bundle-includes{margin-top:10px;display:none;flex-direction:column;gap:4px;}
  .bundle-card.selected .bundle-includes{display:flex;}
  .include-item{font-size:12.5px;color:var(--charcoal);display:flex;align-items:baseline;gap:7px;}
  .include-dot{width:4px;height:4px;min-width:4px;border-radius:50%;background:var(--gold);margin-top:6px;}
  .bundle-price{text-align:right;flex-shrink:0;}
  .bundle-price-amount{font-size:20px;font-weight:600;color:var(--black);letter-spacing:-.02em;white-space:nowrap;}
  .bundle-card.selected .bundle-price-amount{color:var(--gold);}
  .bundle-price-label{font-size:11px;color:var(--mid);font-weight:400;}
  .badge-recommended{display:inline-flex;align-items:center;gap:4px;background:var(--red);color:#fff;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:3px;margin-bottom:6px;}
  .bid-notes{background:var(--white);border:1.5px solid var(--divider);border-radius:var(--radius);padding:20px 24px;}
  .notes-title{font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mid);margin-bottom:12px;}
  .notes-list{list-style:none;display:flex;flex-direction:column;gap:7px;}
  .notes-list li{font-size:13px;color:var(--charcoal);display:flex;gap:10px;line-height:1.5;}
  .notes-list li::before{content:'\2014';color:var(--mid);flex-shrink:0;}
  .summary-panel{position:sticky;top:28px;}
  .summary-card{background:var(--white);border:1.5px solid var(--divider);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-md);}
  .summary-header{background:var(--black);padding:16px 20px;}
  .summary-header-title{color:#fff;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;opacity:.75;}
  .summary-body{padding:20px;}
  .summary-scope-name{font-size:16px;font-weight:600;color:var(--black);margin-bottom:4px;min-height:24px;transition:opacity .2s;}
  .summary-scope-name.empty{color:var(--mid);font-weight:400;font-size:14px;}
  .summary-divider{height:1px;background:var(--divider);margin:16px 0;}
  .summary-total-label{font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);margin-bottom:4px;}
  .summary-total-amount{font-size:38px;font-weight:600;color:var(--black);letter-spacing:-.03em;font-variant-numeric:tabular-nums;min-height:46px;transition:color .2s;}
  .summary-total-amount.has-value{color:var(--red);}
  .summary-total-amount.zero{color:var(--divider);font-size:28px;padding-top:9px;}
  .summary-includes{margin-top:14px;display:flex;flex-direction:column;gap:6px;min-height:40px;}
  .si-item{font-size:12.5px;color:var(--charcoal);display:flex;align-items:baseline;gap:8px;opacity:0;transform:translateY(4px);transition:opacity .2s,transform .2s;}
  .si-item.visible{opacity:1;transform:translateY(0);}
  .si-bullet{width:4px;height:4px;min-width:4px;border-radius:50%;background:var(--red);margin-top:5px;}
  .summary-footer{padding:16px 20px 20px;border-top:1px solid var(--divider);display:flex;flex-direction:column;gap:10px;}
  .ask-fields{display:flex;flex-direction:column;gap:8px;margin-bottom:2px;}
  .ask-input,.ask-textarea{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--black);padding:9px 11px;border:1.5px solid var(--divider);border-radius:var(--radius);background:var(--white);transition:border-color .15s;resize:none;}
  .ask-input::placeholder,.ask-textarea::placeholder{color:#A8A29A;}
  .ask-input:focus,.ask-textarea:focus{outline:none;border-color:var(--checked-bdr);}
  .ask-textarea{min-height:62px;line-height:1.45;}
  .btn-primary{display:block;width:100%;background:var(--red);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;letter-spacing:.04em;padding:13px 20px;border:none;border-radius:var(--radius);cursor:pointer;text-align:center;transition:background .15s;}
  .btn-primary:hover{background:var(--red-dark);}
  .btn-primary:disabled{background:var(--divider);color:var(--mid);cursor:default;}
  .btn-secondary{display:block;width:100%;background:transparent;color:var(--charcoal);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px 20px;border:1.5px solid var(--divider);border-radius:var(--radius);cursor:pointer;text-align:center;transition:border-color .15s,color .15s;}
  .btn-secondary:hover{border-color:var(--charcoal);color:var(--black);}
  .summary-meta{font-size:11.5px;color:var(--mid);text-align:center;line-height:1.5;}
  .contact-strip{background:var(--white);border:1.5px solid var(--divider);border-radius:var(--radius);padding:16px 20px;margin-top:12px;}
  .contact-label{font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);margin-bottom:10px;}
  .contact-name{font-size:14px;font-weight:600;color:var(--black);margin-bottom:2px;}
  .contact-role{font-size:12px;color:var(--mid);margin-bottom:8px;}
  .contact-links{display:flex;flex-direction:column;gap:4px;}
  .contact-links a{font-size:12.5px;color:var(--red);text-decoration:none;font-weight:500;}
  .contact-links a:hover{text-decoration:underline;}
  .site-footer{background:var(--black);padding:28px 48px;display:flex;align-items:center;justify-content:space-between;margin-top:40px;}
  .footer-copy{font-size:12px;color:rgba(255,255,255,.35);}
  .footer-prepared{font-size:12px;color:rgba(255,255,255,.35);text-align:right;}
  @media (max-width:800px){.site-header,.property-hero{padding-left:20px;padding-right:20px;}.bid-layout{grid-template-columns:1fr;padding:24px 20px 60px;gap:24px;}.summary-panel{position:static;}.property-name{font-size:26px;}.summary-total-amount{font-size:32px;}}
  @media print{.summary-footer{display:none;}.summary-panel{position:static;}body{background:#fff;}}
  @media (prefers-reduced-motion:reduce){*,*::before,*::after,.si-item{transition:none !important;}}
</style>
</head>

    card.dataset.id=bundle.id;
    const includesHtml=bundle.includes.map(function(inc){return '<div class="include-item"><div class="include-dot"></div><span>'+inc+'</span></div>';}).join('');
    const badgeHtml=bundle.recommended?'<div class="badge-recommended">Recommended</div>':'';
    card.innerHTML=
      '<div class="bundle-inner">'+
        '<div class="bundle-check"></div>'+
        '<div class="bundle-content">'+badgeHtml+
          '<div class="bundle-title">'+bundle.title+'</div>'+
          '<div class="bundle-desc">'+bundle.desc+'</div>'+
          '<div class="bundle-includes">'+includesHtml+'</div>'+
        '</div>'+
        '<div class="bundle-price">'+
          '<div class="bundle-price-amount">'+fmt(bundle.price)+'</div>'+
          '<div class="bundle-price-label">total estimate</div>'+
        '</div>'+
      '</div>';
    card.addEventListener('click',function(){selectBundle(bundle.id);});
    card.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();selectBundle(bundle.id);}});
    group.appendChild(card);
  });

  function selectBundle(id){
    selectedId=id;
    const bundle=BID_BUNDLES.find(function(b){return b.id===id;});
    if(!bundle)return;
    document.querySelectorAll('.bundle-card').forEach(function(card){
      const isThis=card.dataset.id===id;
      card.classList.toggle('selected',isThis);
      card.setAttribute('aria-checked',isThis?'true':'false');
    });
    const nameEl=document.getElementById('summary-scope-name');
    nameEl.textContent=bundle.title;nameEl.classList.remove('empty');
    animateTotal(bundle.price);
    const includesEl=document.getElementById('summary-includes');
    includesEl.innerHTML='';
    bundle.includes.forEach(function(inc,i){
      const item=document.createElement('div');
      item.className='si-item';
      item.innerHTML='<div class="si-bullet"></div><span>'+inc+'</span>';
      includesEl.appendChild(item);
      setTimeout(function(){item.classList.add('visible');},i*55+80);
    });
    document.getElementById('summary-meta').textContent='Valid '+BID_META.validDays+' days · Ref '+BID_META.refNumber;
    document.getElementById('btn-request').disabled=false;
  }

  function animateTotal(target){
    const el=document.getElementById('summary-total');
    el.classList.remove('zero');el.classList.add('has-value');
    const start=extractNumber(el.textContent)||0;
    const duration=420;const startTime=performance.now();
    function step(now){
      const p=Math.min((now-startTime)/duration,1);
      const eased=1-Math.pow(1-p,4);
      el.textContent=fmt(Math.round(start+(target-start)*eased));
      if(p<1)requestAnimationFrame(step);else el.textContent=fmt(target);
    }
    requestAnimationFrame(step);
  }
  function extractNumber(str){const c=(str||'').replace(/[^0-9]/g,'');return c?parseInt(c,10):0;}

  document.getElementById('btn-request').addEventListener('click',function(){
    const btn=document.getElementById('btn-request');
    const bundle=BID_BUNDLES.find(function(b){return b.id===selectedId;});
    if(!bundle)return;
    const payload={
      property:BID_META.property,ref:BID_META.refNumber,client:BID_META.client,
      selected:[bundle.title],total:bundle.price,
      contact_name:(document.getElementById('ask-name')||{}).value||'',
      contact_email:(document.getElementById('ask-email')||{}).value||'',
      comment:(document.getElementById('ask-comment')||{}).value||''
    };
    if(SUBMIT_ENDPOINT){
      btn.disabled=true;btn.textContent='Submitting…';
      fetch(SUBMIT_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
        .then(function(r){return r.json();})
        .then(function(){showConfirmation(bundle);})
        .catch(function(){emailFallback(bundle);});
    }else{emailFallback(bundle);}
  });

  function showConfirmation(bundle){
    const panel=document.querySelector('.summary-body');
    const footer=document.querySelector('.summary-footer');
    if(footer)footer.style.display='none';
    if(panel){
      panel.innerHTML=
        '<div style="text-align:center;padding:12px 0;">'+
          '<div style="width:48px;height:48px;border-radius:50%;background:#2E7D32;margin:0 auto 14px;position:relative;">'+
            '<div style="position:absolute;left:17px;top:12px;width:10px;height:18px;border-right:3px solid #fff;border-bottom:3px solid #fff;transform:rotate(45deg);"></div>'+
          '</div>'+
          '<div style="font-size:17px;font-weight:600;color:#1A1A1A;margin-bottom:8px;">Scope submitted</div>'+
          '<div style="font-size:13px;color:#6B6B6B;line-height:1.5;margin-bottom:16px;">Thank you. '+CONTACT.name+' has received your selected scope and will be in touch shortly to schedule a walkthrough.</div>'+
          '<div style="background:#F8F7F5;border-radius:6px;padding:14px;text-align:left;">'+
            '<div style="font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#6B6B6B;margin-bottom:8px;">Your selection</div>'+
            '<div style="font-size:13px;color:#2E2E2E;padding:2px 0;">• '+bundle.title+'</div>'+
            '<div style="border-top:1px solid #E2DFD9;margin-top:8px;padding-top:8px;font-size:15px;font-weight:600;color:#CC0000;">Total: '+fmt(bundle.price)+'</div>'+
          '</div>'+
        '</div>';
    }
  }
  function emailFallback(bundle){
    const subject=encodeURIComponent('Scope Submission — '+BID_META.property+' ('+BID_META.refNumber+')');
    const body=encodeURIComponent('Selected scope: '+bundle.title+' — '+fmt(bundle.price));
    window.location.href='mailto:'+CONTACT.email+'?subject='+subject+'&body='+body;
  }
  document.getElementById('btn-print').addEventListener('click',function(){window.print();});
})();
</script>
</body>
</html>
